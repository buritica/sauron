# Alertmanager Configuration - Sauron
# Route and manage alerts

global:
  resolve_timeout: 5m

# Default route
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  # Child routes
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true

    - match:
        severity: warning
      receiver: 'warning'

# Inhibition rules - silence certain alerts when others are firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers configuration
receivers:
  # Default receiver (no notifications, just log)
  - name: 'default'

  # Critical alerts
  - name: 'critical'
    # Uncomment and configure your notification method:

