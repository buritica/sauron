# Alertmanager Configuration - Sauron
# Route and manage alerts. All notifications go through the ca webhook
# (POST /webhook/alert on the host), which formats firing/resolved groups and
# posts to the Slack alert channel. Bearer token is read from a mounted,
# gitignored credentials file (config/alertmanager/webhook-secret) — never
# committed. Must match ALERT_WEBHOOK_SECRET in the ca daemon env.

global:
  resolve_timeout: 5m

# Default route. Everything funnels to ca-webhook, so no child routes are
# needed. Edge-triggered by design: alerts fire when an event is DETECTED and
# resolve when it clears — no recurring re-notification while a condition holds.
# Alertmanager has no native "notify once" flag, so repeat_interval is set
# absurdly high to suppress re-paging; send_resolved on the receiver still
# delivers the one RESOLVED. Grouping stays coarse to batch a burst into one
# message (ca renders the count, e.g. "ServiceDown (5)").
route:
  group_by: ['alertname']      # collapse all instances of an alert into one message
  group_wait: 30s              # batch related alerts before the first page
  group_interval: 15m          # re-notify only when the group's membership CHANGES, ≤ every 15m
  repeat_interval: 8760h       # effectively never re-page an unchanged firing group (1y) → edge-triggered
  receiver: 'slack-alerts'

# Inhibition rules - silence certain alerts when others are firing
inhibit_rules:
  # A critical mutes the matching warning for the same alert+instance.
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  # When a scrape target is down (ServiceDown), the derived "targets unreachable"
  # alert is redundant noise — mute it while any ServiceDown is firing.
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'PrometheusTargetsDown'
    equal: []

# Receivers — direct to Slack (#alerts), no ca hop, so alerts still deliver
# when ca is down/restarting. The incoming-webhook URL lives in a mounted,
# gitignored file (config/alertmanager/slack-webhook-url). Messages are
# host-tagged: title carries the site label (halfmoon), each line the instance.
receivers:
  - name: 'slack-alerts'
    slack_configs:
      - api_url_file: /etc/alertmanager/slack-webhook-url
        channel: '#alerts'
        send_resolved: true
        # NOTE: alertmanager's template engine has NO `default` function (that's
        # sprig/Helm) — using it renders the whole message EMPTY at send time
        # (amtool only checks syntax, not undefined funcs). Use if/else instead.
        title: '{{ if eq .Status "firing" }}:red_circle: FIRING{{ else }}:white_check_mark: RESOLVED{{ end }}: {{ .CommonLabels.alertname }}{{ if .CommonLabels.site }} [{{ .CommonLabels.site }}]{{ end }}'
        text: >-
          {{ range .Alerts -}}
          • *{{ if .Labels.instance }}{{ .Labels.instance }}{{ else }}{{ .Labels.name }}{{ end }}*{{ if .Labels.mountpoint }} ({{ .Labels.mountpoint }}){{ end }} — {{ .Annotations.description }}
          {{ end }}
