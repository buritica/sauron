apiVersion: 1
datasources:
  - name: Loki
    type: loki
    uid: P8E80F9AEF21F6940
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      # Links JSON log lines containing `"traceId":"<hex>"` to the Tempo trace view.
      # Ported from buritica/botsito's create-dashboards.ts deploy script (#621),
      # which had to inject this via the Grafana API. Native provisioning is the
      # correct home for datasource-level config.
      derivedFields:
        - name: traceId
          matcherRegex: '"traceId"\s*:\s*"([a-f0-9]+)"'
          url: "$${__value.raw}"
          datasourceUid: PE20A8C6A3B2F1D90
          urlDisplayLabel: View Trace
