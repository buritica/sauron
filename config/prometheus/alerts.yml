# Prometheus Alert Rules - Sauron
# One does not simply ignore these alerts

groups:
  - name: sauron_critical
    interval: 30s
    rules:
      # Service is down
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 2 minutes."

      # Container down
      - alert: ContainerDown
        expr: absent(container_last_seen{name!=""})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container monitoring unavailable"
          description: "cAdvisor is not reporting container metrics"

  - name: sauron_disk
    # Disk fills slowly — evaluate every 10m (not the global 15s). Cheaper and
    # avoids transient flapping. The for: debounces below still apply.
    interval: 10m
    rules:
      # Critical disk space
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.mountpoint }}"
          description: "Disk space on {{ $labels.mountpoint }} is below 5% ({{ $value | humanizePercentage }})"

      # Warning disk space
      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.mountpoint }}"
          description: "Disk space on {{ $labels.mountpoint }} is below 15% ({{ $value | humanizePercentage }})"

      # High inode usage
      - alert: HighInodeUsage
        expr: (node_filesystem_files_free / node_filesystem_files) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High inode usage on {{ $labels.mountpoint }}"
          description: "Inode usage on {{ $labels.mountpoint }} is above 90%"

  - name: sauron_memory
    interval: 1m
    rules:
      # Container high memory
      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes{container!=""}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high memory usage"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit"

      # Host high memory
      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage critical"
          description: "Host memory usage is above 90% ({{ $value | humanizePercentage }})"

  - name: sauron_cpu
    interval: 1m
    rules:
      # High CPU usage
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 80% for 10 minutes ({{ $value | humanize }}%)"

      # Container high CPU
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{container!=""}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "Container {{ $labels.name }} CPU usage is high"

  - name: sauron_network
    interval: 1m
    rules:
      # High network errors
      - alert: HighNetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) > 10 or rate(node_network_transmit_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network errors on {{ $labels.device }}"
          description: "Network interface {{ $labels.device }} is experiencing high error rates"

  - name: sauron_container_health
    interval: 1m
    rules:
      # Container restart-looping. The old expr `rate(container_last_seen[5m])`
      # was broken: container_last_seen is a wall-clock "last scraped" timestamp
      # that ticks up ~1/s for every RUNNING container, so its rate is ~1 for
      # everything healthy — it fired for all containers permanently and never
      # measured restarts. container_start_time_seconds changes only on an actual
      # (re)start; >2 changes in 15m = genuine crash loop (a single expected
      # restart, e.g. a deploy, is 1 change and stays silent).
      - alert: ContainerRestarting
        expr: changes(container_start_time_seconds{name!=""}[15m]) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is restart-looping"
          description: "Container {{ $labels.name }} restarted {{ $value }} times in the last 15 minutes"

  - name: ca_streaming
    interval: 1m
    rules:
      # Orphaned streaming cursor — THE BUG (ca #1657, fixed by #1659).
      # A stranded cursor (▌) left visible after a streaming finalize. In steady
      # state this counter never increases; any increase means the orphan-cursor
      # regression is back. ca.streaming.finalize{outcome="orphaned"} →
      # ca_streaming_finalize_total (OTLP dot→underscore + _total monotonic suffix,
      # same as ca.messages → ca_messages_total).
      - alert: OrphanedStreamingCursor
        expr: increase(ca_streaming_finalize_total{outcome="orphaned"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Orphaned streaming cursor in ca ({{ $labels.transport }})"
          description: "ca left {{ $value | humanize }} stranded streaming cursor(s) in the last 15m on {{ $labels.transport }} — the orphan-cursor bug (#1657) may have regressed despite the #1659 fix."

      # Deploy-restart stranded cursors above the inherent baseline (ca #1604/#1667).
      # DISTINCT from outcome="orphaned" (steady-state edit-fail, alerted at zero above).
      # ca auto-deploys and kills mid-stream within a bounded 3s finalize budget, so a
      # restart that lands mid-stream LEGITIMATELY strands a placeholder when the finalize
      # sweep times out — strands are inherent, NOT a regression. This must NOT be
      # zero-threshold: only fire when the rate exceeds normal deploy churn (> 3/h).
      - alert: OrphanedStreamingCursorOnRestart
        expr: sum(increase(ca_streaming_finalize_total{outcome="shutdown_orphaned"}[1h])) > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated deploy-restart stranded streaming cursors in ca"
          description: "ca stranded {{ $value | humanize }} streaming cursor(s) via the shutdown finalize sweep in the last 1h — above the inherent deploy-restart baseline. Check whether deploys are landing mid-stream abnormally often, or whether the 3s finalize budget (#1604) is too tight. Distinct from the steady-state orphan-cursor bug (#1657)."

  - name: sauron_prometheus
    interval: 1m
    rules:
      # Prometheus too many targets down. Expr is a 0..1 ratio so
      # humanizePercentage renders it correctly (e.g. 0.1429 → "14.29%").
      # Previously the expr pre-multiplied by 100, so humanizePercentage
      # multiplied again and printed nonsense like "1429%".
      - alert: PrometheusTargetsDown
        expr: count(up == 0) / count(up) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "More than 10% of Prometheus targets are down"
          description: "{{ $value | humanizePercentage }} of targets are unreachable"

      # Prometheus config reload failed
      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus configuration reload has failed. Check prometheus logs."
