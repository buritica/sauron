# Prometheus Configuration - Sauron
# The all-seeing eye of infrastructure monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sauron'
    environment: 'production'
    site: 'halfmoon'   # this stack runs on + primarily monitors halfmoon; surfaced in alert titles

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  # Container metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'

  # Host system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          host: 'local'

  # Morgan containers — scraped via cAdvisor on the sauron network
  # cAdvisor already sees all containers sharing the Colima VM
  # morgan-specific container metrics come through cadvisor job above

  # Node exporter for morgan host (same host, different label)
  - job_name: 'morgan-host'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          project: 'morgan'
          service: 'host'

  # Native macOS node_exporter on halfmoon — reports real APFS filesystem metrics.
  # The containerized node-exporter above only sees the Colima VM disk.
  # node_exporter installed via: brew install node_exporter && brew services start node_exporter
  - job_name: 'halfmoon-host'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          host: 'halfmoon'
          service: 'node-exporter'
