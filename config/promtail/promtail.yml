server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_compose_project']
        target_label: 'compose_project'

  - job_name: aurelio
    static_configs:
      - targets:
          - localhost
        labels:
          job: aurelio
          service: aurelio
          __path__: /host/aurelio/logs/aurelio.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            userId: userId
            messageId: messageId
            traceId: traceId
            spanId: spanId
      - labels:
          level:
          userId:
      - template:
          source: level_name
          template: |
            {{ if eq .level "10" }}trace{{ else if eq .level "20" }}debug{{ else if eq .level "30" }}info{{ else if eq .level "40" }}warn{{ else if eq .level "50" }}error{{ else if eq .level "60" }}fatal{{ else }}unknown{{ end }}
      - labels:
          level_name:
      - timestamp:
          source: time
          format: UnixMs
