server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_compose_project']
        target_label: 'compose_project'

  # Convention: any pino app deployed to ~/deploy/<app>/var/logs/*.log
  # gets auto-discovered. App identity from pino JSON (name or service field).
  - job_name: deploy-apps
    static_configs:
      - targets:
          - localhost
        labels:
          __path__: /host/deploy/*/var/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            name: name
            service: service
            module: module
            channelId: channelId
            userId: userId
            traceId: traceId
            spanId: spanId
      - template:
          source: app
          template: '{{ if .service }}{{ .service }}{{ else }}{{ .name }}{{ end }}'
      - labels:
          app:
          service: app
          level:
          module:
          userId:
      - template:
          source: level_name
          template: |-
            {{ if eq .level "10" }}trace{{ else if eq .level "20" }}debug{{ else if eq .level "30" }}info{{ else if eq .level "40" }}warn{{ else if eq .level "50" }}error{{ else if eq .level "60" }}fatal{{ else }}unknown{{ end }}
      - labels:
          level_name:
      - timestamp:
          source: time
          format: UnixMs

  - job_name: runner-botsito
    static_configs:
      - targets:
          - localhost
        labels:
          job: runner-botsito
          service: runner-botsito
          service_name: runner-botsito
          __path__: /host/runner-botsito/diag/{Runner,Worker}_*.log
    pipeline_stages:
      - regex:
          expression: '^\[(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}Z)\s+(?P<level>\w+)\s+(?P<component>\w+)\]\s*(?P<message>.*)'
      - labels:
          level:
          component:
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05Z"
