# Sauron - The All-Seeing Eye
# Infrastructure monitoring and observability stack

x-common-settings: &common-settings
  restart: unless-stopped

services:
  # Prometheus - Time-series metrics database
  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    networks:
      - sauron
    ports:
      - "9090:9090"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.enable-remote-write-receiver'
    <<: *common-settings

  # Grafana - Visualization and dashboards
  grafana:
    container_name: grafana
    image: grafana/grafana:11.5.2
    networks:
      - sauron
    ports:
      - "3030:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/provisioning/dashboard-files:/etc/grafana/provisioning/dashboard-files:ro
    environment:
      - TZ=Etc/UTC
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sauron_sees_all}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://sauron.buriti.ca
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    <<: *common-settings

  # Alertmanager - Alert routing and notifications
  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:latest
    networks:
      - sauron
    ports:
      - "9093:9093"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    <<: *common-settings

  # cAdvisor - Container metrics exporter
  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    networks:
      - sauron
    ports:
      - "8083:8080"
    environment:
      - TZ=Etc/UTC
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    <<: *common-settings

  # Loki - Log aggregation backend
  loki:
    container_name: loki
    image: grafana/loki:latest
    networks:
      - sauron
    ports:
      - "3100:3100"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - ./data/loki:/loki
    command: -config.file=/etc/loki/loki.yml
    <<: *common-settings

  # Promtail - Log collector (scrapes Docker container logs)
  promtail:
    container_name: promtail
    image: grafana/promtail:latest
    networks:
      - sauron
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /Users/buritica/src/aurelio/logs:/host/aurelio/logs:ro
      - /Users/buritica/src/botsito/logs:/host/botsito/logs:ro
      - /Users/buritica/actions-runner-botsito/_diag:/host/runner-botsito/diag:ro
    command: -config.file=/etc/promtail/promtail.yml
    <<: *common-settings

  # OpenTelemetry Collector - OTLP ingestion and fan-out
  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    networks:
      - sauron
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    <<: *common-settings

  # Tempo - Distributed tracing backend
  tempo:
    container_name: tempo
    image: grafana/tempo:2.9.0
    networks:
      - sauron
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - ./data/tempo:/var/tempo
    command: -config.file=/etc/tempo/tempo.yml
    <<: *common-settings

  # Node Exporter - Host system metrics
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    networks:
      - sauron
    ports:
      - "9100:9100"
    environment:
      - TZ=Etc/UTC
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    <<: *common-settings

networks:
  sauron:
    driver: bridge
