# Sauron - The All-Seeing Eye
# Infrastructure monitoring and observability stack

x-common-settings: &common-settings
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: 384M
      reservations:
        cpus: "0.1"
        memory: 64M

# Lightweight exporters and agents
x-light-settings: &light-settings
  <<: *common-settings
  deploy:
    resources:
      limits:
        cpus: "0.15"
        memory: 128M
      reservations:
        cpus: "0.05"
        memory: 32M

services:
  # Prometheus - Time-series metrics database
  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    networks:
      - sauron
    ports:
      - "9090:9090"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.enable-remote-write-receiver'
    <<: *common-settings

  # Grafana - Visualization and dashboards
  grafana:
    container_name: grafana
    image: grafana/grafana:11.5.2
    networks:
      - sauron
    ports:
      - "3030:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/provisioning/dashboard-files:/etc/grafana/provisioning/dashboard-files:ro
    environment:
      - TZ=Etc/UTC
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sauron_sees_all}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://sauron.buriti.ca
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    <<: *common-settings

  # Alertmanager - Alert routing and notifications
  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:latest
    networks:
      - sauron
    ports:
      - "9093:9093"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./config/alertmanager/webhook-secret:/etc/alertmanager/webhook-secret:ro
      - ./config/alertmanager/slack-webhook-url:/etc/alertmanager/slack-webhook-url:ro
      - ./data/alertmanager:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    <<: *light-settings

  # cAdvisor - Container metrics exporter
  # OrbStack notes:
  #   1. Host bind mounts (/, /sys, /var/lib/docker, /dev/disk) transparently
  #      resolve to the OrbStack Linux VM's paths — NOT macOS — so they still
  #      give cAdvisor the cgroupfs + docker layout it needs.
  #   2. OrbStack runs docker on top of a containerd snapshotter (`docker info`
  #      → Storage Driver: overlayfs, driver-type:
  #      io.containerd.snapshotter.v1). cAdvisor's docker factory hard-requires
  #      a containerd client for registration, so we point --containerd at
  #      OrbStack's docker containerd socket via /rootfs. Docker Compose
  #      won't bind /run/docker/containerd/ directly — it treats the source as
  #      a macOS path, finds nothing, and mounts an empty dir.
  #   3. Image pinned to v0.55.1 — earlier releases fail container creation on
  #      OrbStack because they look for docker's overlay2 layerdb, which the
  #      containerd snapshotter doesn't produce. v0.55.x tolerates its absence.
  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    networks:
      - sauron
    ports:
      - "8083:8080"
    environment:
      - TZ=Etc/UTC
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Merged fixes:
    # - --containerd (OrbStack): docker factory needs a containerd client to
    #   register; OrbStack's docker containerd socket lives at
    #   /run/docker/containerd/containerd.sock in the VM, reached via /rootfs.
    # - --disable_metrics=disk,diskIO,…: cadvisor was choking on per-container
    #   filesystem du/inode scans (minutes-long on a busy overlayfs after the
    #   disk-full incident), hanging :8080 → ServiceDown/ContainerDown flapping.
    #   Host disk still comes from node-exporter (which is what the disk alerts
    #   use), so disabling here is safe. Kernel/host-only classes (advtcp,
    #   hugetlb, memory_numa, percpu, referenced_memory, resctrl, sched, tcp,
    #   udp) never populate under Docker anyway.
    # - --docker_only: skip non-docker cgroups (the OrbStack VM's /.lxc etc.).
    # - --housekeeping_interval 30s: sample far less aggressively than the 1s
    #   default; matches Prometheus's ~30s scrape cadence.
    command:
      - '--containerd=/rootfs/run/docker/containerd/containerd.sock'
      - '--disable_metrics=disk,diskIO,advtcp,hugetlb,memory_numa,percpu,referenced_memory,resctrl,sched,tcp,udp'
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
    privileged: true
    devices:
      - /dev/kmsg
    <<: *common-settings

  # Loki - Log aggregation backend
  loki:
    container_name: loki
    image: grafana/loki:latest
    networks:
      - sauron
    ports:
      - "3100:3100"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - ./data/loki:/loki
    command: -config.file=/etc/loki/loki.yml
    # NOT *common-settings: Loki 3.x single-binary needs more than the shared
    # 384M cap. It was OOM-killed (exit 137) every ~30s — 680+ restarts — after
    # the disk-full event left a large WAL to replay. 1G gives real headroom.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 128M

  # Promtail - Log collector (scrapes Docker container logs)
  promtail:
    container_name: promtail
    image: grafana/promtail:latest
    networks:
      - sauron
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /Users/buritica/deploy:/host/deploy:ro
      - /Users/buritica/actions-runner-ca/_diag:/host/runner-ca/diag:ro
      - /Users/buritica/var/log:/host/var-log:ro
    command: -config.file=/etc/promtail/promtail.yml
    <<: *common-settings

  # OpenTelemetry Collector - OTLP ingestion and fan-out
  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    networks:
      - sauron
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    <<: *common-settings

  # Tempo - Distributed tracing backend
  tempo:
    container_name: tempo
    image: grafana/tempo:2.9.0
    networks:
      - sauron
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - ./data/tempo:/var/tempo
    command: -config.file=/etc/tempo/tempo.yml
    <<: *common-settings

  # Node Exporter - Host system metrics
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    networks:
      - sauron
    ports:
      - "9100:9100"
    environment:
      - TZ=Etc/UTC
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    <<: *light-settings

networks:
  sauron:
    driver: bridge
